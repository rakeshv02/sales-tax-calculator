<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sales Tax Calculator — Tabutility</title>
<meta name="description" content="Free sales tax calculator. Add or remove tax from any price. All US state rates included. Instant results."/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}
nav{background:#1e293b;border-bottom:1px solid #334155;padding:14px 24px;display:flex;align-items:center;gap:16px}
nav a{color:#94a3b8;text-decoration:none;font-size:14px}nav a:hover{color:#f1f5f9}
nav .brand{color:#38bdf8;font-weight:700;font-size:18px}
.ad-banner{background:#1e293b;border-bottom:1px solid #334155;padding:8px;text-align:center}
#app{max-width:540px;margin:36px auto;padding:0 20px 40px}
h1{font-size:26px;font-weight:700;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;color:#94a3b8;margin-bottom:24px;font-size:14px}
.card{background:#1e293b;border-radius:18px;padding:24px;border:1px solid #334155;margin-bottom:16px}
.tabs{display:flex;gap:4px;background:#0f172a;border-radius:10px;padding:4px;margin-bottom:20px}
.tab{flex:1;border:none;border-radius:7px;padding:9px;font-size:14px;font-weight:600;cursor:pointer;background:none;color:#64748b;transition:all .15s}
.tab.active{background:#38bdf8;color:#0f172a}
label{display:block;font-size:13px;color:#94a3b8;margin-bottom:5px}
.field{margin-bottom:14px}
.input-wrap{position:relative}
.input-wrap span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#64748b;font-size:16px}
input,select{width:100%;background:#0f172a;color:#f1f5f9;border:1px solid #334155;border-radius:10px;padding:11px 12px;font-size:16px}
input[type=number]{padding-left:28px}
select{padding:11px 12px;appearance:none;cursor:pointer}
.results{background:#0f172a;border-radius:12px;padding:18px}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e293b}
.res-row:last-child{border-bottom:none;padding-top:12px}
.res-lbl{color:#94a3b8;font-size:14px}
.res-val{font-family:monospace;font-size:17px;font-weight:600}
.res-val.total{font-size:24px;color:#38bdf8}
.state-rates{background:#1e293b;border-radius:16px;border:1px solid #334155;overflow:hidden}
.sr-header{padding:13px 18px;border-bottom:1px solid #334155;font-size:13px;color:#64748b;font-weight:600;display:flex;justify-content:space-between}
.sr-row{display:flex;justify-content:space-between;padding:9px 18px;border-bottom:1px solid #0f172a;font-size:14px}
.sr-row:nth-child(even){background:#1a2535}
</style>
</head>
<body>
<nav><span class="brand">⚡ Tabutility</span><a href="https://tabutility.com">← All Tools</a></nav>
<div class="ad-banner"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
<div id="app">
  <h1>Sales Tax Calculator</h1>
  <p class="subtitle">Add or remove US sales tax · All state rates included</p>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="setTab('add')">Add Tax</button>
      <button class="tab" onclick="setTab('remove')">Remove Tax</button>
      <button class="tab" onclick="setTab('custom')">Custom Rate</button>
    </div>
    <div class="field">
      <label>Price ($)</label>
      <div class="input-wrap"><span>$</span><input type="number" id="price" placeholder="0.00" oninput="calc()"/></div>
    </div>
    <div class="field" id="state-field">
      <label>State</label>
      <select id="state-sel" onchange="calc()"></select>
    </div>
    <div class="field" id="custom-field" style="display:none">
      <label>Tax Rate (%)</label>
      <input type="number" id="custom-rate" placeholder="8.5" step="0.01" oninput="calc()"/>
    </div>
    <div class="results" id="results" style="display:none">
      <div class="res-row"><span class="res-lbl">Original Price</span><span class="res-val" id="r-orig"></span></div>
      <div class="res-row"><span class="res-lbl" id="r-tax-lbl">Tax Amount</span><span class="res-val" id="r-tax"></span></div>
      <div class="res-row"><span class="res-lbl" id="r-tot-lbl">Total</span><span class="res-val total" id="r-tot"></span></div>
    </div>
  </div>
  <div class="state-rates">
    <div class="sr-header"><span>State</span><span>State Rate</span></div>
    <div id="state-rate-list"></div>
  </div>
</div>
<script>
var STATES = [
  ['Alabama','AL',4],['Alaska','AK',0],['Arizona','AZ',5.6],['Arkansas','AR',6.5],
  ['California','CA',7.25],['Colorado','CO',2.9],['Connecticut','CT',6.35],['Delaware','DE',0],
  ['Florida','FL',6],['Georgia','GA',4],['Hawaii','HI',4],['Idaho','ID',6],
  ['Illinois','IL',6.25],['Indiana','IN',7],['Iowa','IA',6],['Kansas','KS',6.5],
  ['Kentucky','KY',6],['Louisiana','LA',4.45],['Maine','ME',5.5],['Maryland','MD',6],
  ['Massachusetts','MA',6.25],['Michigan','MI',6],['Minnesota','MN',6.875],['Mississippi','MS',7],
  ['Missouri','MO',4.225],['Montana','MT',0],['Nebraska','NE',5.5],['Nevada','NV',6.85],
  ['New Hampshire','NH',0],['New Jersey','NJ',6.625],['New Mexico','NM',5],['New York','NY',4],
  ['North Carolina','NC',4.75],['North Dakota','ND',5],['Ohio','OH',5.75],['Oklahoma','OK',4.5],
  ['Oregon','OR',0],['Pennsylvania','PA',6],['Rhode Island','RI',7],['South Carolina','SC',6],
  ['South Dakota','SD',4.5],['Tennessee','TN',7],['Texas','TX',6.25],['Utah','UT',6.1],
  ['Vermont','VT',6],['Virginia','VA',5.3],['Washington','WA',6.5],['West Virginia','WV',6],
  ['Wisconsin','WI',5],['Wyoming','WY',4]
];

var tab = 'add';
var sel = document.getElementById('state-sel');
STATES.forEach(function(s){
  var o=document.createElement('option'); o.value=s[2]; o.textContent=s[0]+' ('+s[1]+') — '+s[2]+'%';
  sel.appendChild(o);
});
// Default to CA
sel.value = 7.25;

var list = document.getElementById('state-rate-list');
STATES.forEach(function(s){
  var row=document.createElement('div'); row.className='sr-row';
  row.innerHTML='<span>'+s[0]+' ('+s[1]+')</span><span>'+(s[2]===0?'No tax':s[2]+'%')+'</span>';
  list.appendChild(row);
});

function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach(function(b,i){ b.className='tab'+((['add','remove','custom'][i])===t?' active':''); });
  document.getElementById('state-field').style.display = t==='custom'?'none':'block';
  document.getElementById('custom-field').style.display = t==='custom'?'block':'none';
  calc();
}

function fmt(n){ return '$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }

function calc(){
  var price=parseFloat(document.getElementById('price').value);
  if(isNaN(price)||price<0){ document.getElementById('results').style.display='none'; return; }
  var rate = tab==='custom' ? parseFloat(document.getElementById('custom-rate').value)||0 : parseFloat(sel.value)||0;
  var orig,taxAmt,total;
  if(tab==='remove'){
    total=price; orig=price/(1+rate/100); taxAmt=total-orig;
    document.getElementById('r-tax-lbl').textContent='Tax Included ('+rate+'%)';
    document.getElementById('r-tot-lbl').textContent='Price Before Tax';
    document.getElementById('r-orig').textContent=fmt(total);
    document.getElementById('r-tax').textContent=fmt(taxAmt);
    document.getElementById('r-tot').textContent=fmt(orig);
  } else {
    orig=price; taxAmt=price*rate/100; total=price+taxAmt;
    document.getElementById('r-tax-lbl').textContent='Tax Amount ('+rate+'%)';
    document.getElementById('r-tot-lbl').textContent='Total';
    document.getElementById('r-orig').textContent=fmt(orig);
    document.getElementById('r-tax').textContent=fmt(taxAmt);
    document.getElementById('r-tot').textContent=fmt(total);
  }
  document.getElementById('results').style.display='block';
}
</script>
</body>
</html>
